<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shape Collector Simulator - V1.1.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .crate-card { transition: transform 0.2s, border-color 0.2s; }
        .crate-card:hover { transform: translateY(-5px); }
        
        .rarity-common { color: #94a3b8; border-color: #475569; }
        .rarity-uncommon { color: #4ade80; border-color: #166534; }
        .rarity-rare { color: #60a5fa; border-color: #1e40af; }
        .rarity-epic { color: #c084fc; border-color: #6b21a8; }
        .rarity-legendary { color: #facc15; border-color: #854d0e; }
        .rarity-crazy { color: #f43f5e; border-color: #881337; }

        .bg-common { background: #1e293b; }
        .bg-uncommon { background: #064e3b; }
        .bg-rare { background: #1e3a8a; }
        .bg-epic { background: #4c1d95; }
        .bg-legendary { background: #713f12; }
        .bg-crazy { background: #4c0519; }

        /* Shape Styles */
        .shape-tiny-dot { width: 8px; height: 8px; background: currentColor; border-radius: 50%; }
        .shape-dot { width: 16px; height: 16px; background: currentColor; border-radius: 50%; }
        .shape-big-dot { width: 32px; height: 32px; background: currentColor; border-radius: 50%; }
        
        .shape-line { width: 30px; height: 4px; background: currentColor; border-radius: 2px; transform: rotate(-45deg); }
        .shape-long-line { width: 50px; height: 4px; background: currentColor; border-radius: 2px; transform: rotate(-45deg); }
        .shape-curved-line { 
            width: 35px; height: 35px; 
            border: 4px solid transparent; 
            border-top: 4px solid currentColor; 
            border-right: 4px solid currentColor; 
            border-radius: 50%; 
            transform: rotate(-45deg);
        }

        .shape-circle { width: 40px; height: 40px; border: 4px solid currentColor; border-radius: 50%; }
        .shape-circle-full { width: 40px; height: 40px; background: currentColor; border-radius: 50%; }
        .shape-semi-circle { 
            width: 40px; height: 20px; 
            background: currentColor; 
            border-top-left-radius: 40px; 
            border-top-right-radius: 40px; 
        }

        .shape-triangle { width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-bottom: 35px solid currentColor; }
        .shape-triangle-hollow { 
            width: 0; height: 0; 
            border-left: 20px solid transparent; border-right: 20px solid transparent; border-bottom: 35px solid currentColor;
            position: relative;
        }
        .shape-triangle-hollow::after {
            content: ''; position: absolute; left: -16px; top: 5px;
            border-left: 16px solid transparent; border-right: 16px solid transparent; border-bottom: 28px solid #1e293b;
        }
        .shape-ext-triangle-hollow {
            width: 40px; height: 35px;
            border-left: 4px solid currentColor;
            border-bottom: 4px solid currentColor;
            position: relative;
        }
        .shape-ext-triangle-hollow::before {
            content: ''; position: absolute; top: -2px; left: -2px;
            width: 55px; height: 4px; background: currentColor;
            transform: rotate(41deg); transform-origin: top left;
        }

        .shape-square { width: 35px; height: 35px; border: 4px solid currentColor; }
        .shape-square-full { width: 35px; height: 35px; background: currentColor; }
        .shape-big-square-full { width: 50px; height: 50px; background: currentColor; }

        /* Pentagon Construction using Clip-path */
        .shape-pentagon-hollow {
            width: 45px; height: 45px;
            background: currentColor;
            clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
            position: relative;
        }
        .shape-pentagon-hollow::after {
            content: ''; position: absolute; inset: 4px;
            background: #1e293b; /* Matches inventory bg */
            clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
        }
        .shape-pentagon-full {
            width: 45px; height: 45px;
            background: currentColor;
            clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
        }
        .shape-big-pentagon-full {
            width: 80; height: 80;
            background: currentColor;
            clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
        }

        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: popIn 0.3s ease-out forwards; }
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 pb-32">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start mb-8 bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 gap-4">
            <div class="flex-1">
                <h1 class="text-3xl font-bold bg-gradient-to-r from-teal-400 via-rose-500 to-indigo-500 bg-clip-text text-transparent">Shape Collector V1.1.1</h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-tighter">The Crazy Update</p>
                <div class="flex items-center gap-4 mt-1 text-slate-400 text-sm">
                    <span>Day <span id="day-counter">1</span></span>
                    <span>•</span>
                    <span>Market Refresh: <span id="timer" class="font-mono text-blue-300">10:00</span></span>
                </div>
            </div>
            <div class="text-right">
                <p class="text-sm text-slate-400">Balance</p>
                <p class="text-2xl font-mono text-green-400" id="balance">$200,000</p>
                <div class="flex gap-2 mt-2">
                    <button onclick="nextDay()" class="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-xs transition">Next Day</button>
                    <button onclick="toggleInventory()" class="px-3 py-1 bg-blue-600 hover:bg-blue-500 rounded text-xs transition font-bold">Inventory (<span id="inv-count">0</span>/100)</button>
                </div>
            </div>
        </div>

        <!-- Crate Selection -->
        <div id="crate-selection" class="grid grid-cols-2 md:grid-cols-6 gap-4 mb-8">
            <button onclick="openCrate('common_crate')" class="crate-card border-2 p-4 rounded-xl bg-slate-800 rarity-common flex flex-col items-center">
                <span class="text-2xl mb-1">📦</span>
                <span class="font-bold text-sm">Common</span>
                <span class="text-[10px] opacity-70">FREE</span>
            </button>
            <button onclick="openCrate('uncommon_crate')" class="crate-card border-2 p-4 rounded-xl bg-slate-800 rarity-uncommon flex flex-col items-center">
                <span class="text-2xl mb-1">🟢</span>
                <span class="font-bold text-sm">Uncommon</span>
                <span class="text-[10px] opacity-70">$100</span>
            </button>
            <button onclick="openCrate('rare_crate')" class="crate-card border-2 p-4 rounded-xl bg-slate-800 rarity-rare flex flex-col items-center">
                <span class="text-2xl mb-1">🔵</span>
                <span class="font-bold text-sm">Rare</span>
                <span class="text-[10px] opacity-70">$500</span>
            </button>
            <button onclick="openCrate('epic_crate')" class="crate-card border-2 p-4 rounded-xl bg-slate-800 rarity-epic flex flex-col items-center">
                <span class="text-2xl mb-1">🟣</span>
                <span class="font-bold text-sm">Epic</span>
                <span class="text-[10px] opacity-70">$2,000</span>
            </button>
            <button onclick="openCrate('legendary_crate')" class="crate-card border-2 p-4 rounded-xl bg-slate-800 rarity-legendary flex flex-col items-center">
                <span class="text-2xl mb-1">👑</span>
                <span class="font-bold text-sm">Legendary</span>
                <span class="text-[10px] opacity-70">$10,000</span>
            </button>
            <button onclick="openCrate('crazy_crate')" class="crate-card border-2 p-4 rounded-xl bg-slate-800 rarity-crazy flex flex-col items-center">
                <span class="text-2xl mb-1">C</span>
                <span class="font-bold text-sm">Crazy</span>
                <span class="text-[10px] opacity-70">$200,000</span>
            </button>
        </div>

        <!-- Inventory Panel (Toggled) -->
        <div id="inventory-panel" class="hidden mb-8 bg-slate-900 border border-slate-700 rounded-2xl p-6 shadow-2xl animate-pop">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Your Inventory</h2>
                <div class="flex gap-2">
                    <button onclick="openBulkSell()" class="px-3 py-1 bg-red-900/40 hover:bg-red-900/60 text-red-200 border border-red-700 rounded text-xs">Bulk Sell Options</button>
                    <button onclick="toggleInventory()" class="text-slate-400 hover:text-white">✕</button>
                </div>
            </div>
            <div id="inventory-list" class="inventory-grid max-h-96 overflow-y-auto pr-2">
                <!-- Items appear here -->
            </div>
        </div>

        <!-- History Log -->
        <div class="mt-8">
            <h3 class="text-sm font-bold mb-4 opacity-50 uppercase tracking-widest">Recent Activity</h3>
            <div id="history-log" class="space-y-2">
                <div class="text-slate-500 italic text-xs">No activity yet...</div>
            </div>
        </div>
    </div>

    <!-- Result Modal -->
    <div id="result-screen" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-sm p-4">
        <div id="result-container" class="relative w-full max-w-md bg-slate-900 border-2 rounded-3xl overflow-hidden animate-pop shadow-2xl">
            <div class="p-4 text-center border-b border-white/10">
                <span id="rarity-text" class="uppercase tracking-widest font-black text-sm">RARITY</span>
            </div>
            <div class="p-8 flex flex-col items-center">
                <div id="result-visual" class="mb-6 h-24 w-24 flex items-center justify-center"></div>
                <h2 id="result-name" class="text-2xl font-bold mb-1 text-center">Item Name</h2>
                <div class="flex gap-8 mt-4 text-center">
                    <div>
                        <p class="text-[10px] uppercase opacity-50">Market Value</p>
                        <p id="result-price" class="text-green-400 font-mono font-bold text-lg">$0</p>
                    </div>
                    <div>
                        <p class="text-[10px] uppercase opacity-50">Demand</p>
                        <p id="result-demand" class="font-bold text-sm">OK</p>
                    </div>
                </div>
            </div>
            <div class="flex border-t border-white/10">
                <button id="btn-sell-now" class="flex-1 py-4 bg-white/5 hover:bg-green-600/20 transition font-bold border-r border-white/10 text-green-400">SELL NOW</button>
                <button id="btn-keep" class="flex-1 py-4 bg-white/5 hover:bg-blue-600/20 transition font-bold text-blue-400">KEEP ITEM</button>
            </div>
        </div>
    </div>

    <!-- Bulk Sell Modal -->
    <div id="bulk-sell-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/80 p-4">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-sm rounded-2xl p-6 shadow-2xl">
            <h3 class="text-lg font-bold mb-4">Bulk Sell Items</h3>
            <div class="space-y-3">
                <button onclick="bulkSell('all')" class="w-full p-3 bg-slate-800 hover:bg-slate-700 rounded-lg text-left flex justify-between transition">
                    <span>Sell Everything</span>
                    <span class="opacity-50 text-xs">Clear Inventory</span>
                </button>
                <button onclick="showRarityPicker()" class="w-full p-3 bg-slate-800 hover:bg-slate-700 rounded-lg text-left flex justify-between transition">
                    <span>Sell by Rarity</span>
                    <span class="opacity-50 text-xs">Choose Rarity</span>
                </button>
            </div>
            <button onclick="closeBulkSell()" class="mt-6 w-full py-2 text-slate-400 hover:text-white text-sm">Cancel</button>
        </div>
    </div>

    <script>
        // --- GAME STATE ---
        let balance = 200000;
        let day = 1;
        let secondsRemaining = 600;
        let inventory = [];
        const INV_MAX = 100;

        let lastDayCollectionCount = {}; 

        const demandTiers = [
            { id: 0, label: "Extremely Low", mult: 0.25, weight: 5 },
            { id: 1, label: "Very Low", mult: 0.5, weight: 10 },
            { id: 2, label: "Low", mult: 0.75, weight: 15 },
            { id: 3, label: "Somewhat Low", mult: 0.9, weight: 20 },
            { id: 4, label: "OK", mult: 1.0, weight: 40 },
            { id: 5, label: "Somewhat High", mult: 1.5, weight: 20 },
            { id: 6, label: "High", mult: 2.0, weight: 15 },
            { id: 7, label: "Very High", mult: 2.5, weight: 10 },
            { id: 8, label: "Extremely High", mult: 3.0, weight: 5 }
        ];

        const itemsConfig = {
            common: [
                { id: 'tiny_dot', name: "Tiny Dot", shape: "shape-tiny-dot", basePrice: 5, weight: 50 },
                { id: 'dot', name: "Dot", shape: "shape-dot", basePrice: 10, weight: 35 },
                { id: 'big_dot', name: "Big Dot", shape: "shape-big-dot", basePrice: 25, weight: 15 }
            ],
            uncommon: [
                { id: 'line', name: "Line", shape: "shape-line", basePrice: 60, weight: 45 },
                { id: 'long_line', name: "Long Line", shape: "shape-long-line", basePrice: 90, weight: 30 },
                { id: 'curved_line', name: "Curved Line", shape: "shape-curved-line", basePrice: 100, weight: 25 }
            ],
            rare: [
                { id: 'circle', name: "Hollow Circle", shape: "shape-circle", basePrice: 300, weight: 50 },
                { id: 'semi_circle', name: "Semi-circle", shape: "shape-semi-circle", basePrice: 450, weight: 30 },
                { id: 'circle_full', name: "Full Circle", shape: "shape-circle-full", basePrice: 650, weight: 20 }
            ],
            epic: [
                { id: 'triangle_hollow', name: "Hollow Triangle", shape: "shape-triangle-hollow", basePrice: 1000, weight: 50 },
                { id: 'ext_triangle_hollow', name: "Right Hollow Triangle", shape: "shape-ext-triangle-hollow", basePrice: 1500, weight: 30 },
                { id: 'triangle', name: "Full Triangle", shape: "shape-triangle", basePrice: 2000, weight: 20 }
            ],
            legendary: [
                { id: 'square', name: "Hollow Square", shape: "shape-square", basePrice: 6000, weight: 60 },
                { id: 'square_full', name: "Full Square", shape: "shape-square-full", basePrice: 12000, weight: 30 },
                { id: 'big_square_full', name: "Big Full Square", shape: "shape-big-square-full", basePrice: 25000, weight: 10 }
            ],
            crazy: [
                { id: 'pentagon_hollow', name: "Hollow Pentagon", shape: "shape-pentagon-hollow", basePrice: 100000, weight: 60 },
                { id: 'pentagon_full', name: "Full Pentagon", shape: "shape-pentagon-full", basePrice: 250000, weight: 30 },
                { id: 'big_pentagon_full', name: "Big Full Pentagon", shape: "shape-big-pentagon-full", basePrice: 500000, weight: 10}
            ]
        };

        const crateConfigs = {
            common_crate: { cost: 0, weights: { common: 75, uncommon: 20, rare: 4.5, epic: 0.45, legendary: 0.04, crazy: 0.01 } },
            uncommon_crate: { cost: 100, weights: { common: 20, uncommon: 60, rare: 15, epic: 4, legendary: 0.9, crazy: 0.1 } },
            rare_crate: { cost: 500, weights: { common: 5, uncommon: 15, rare: 65, epic: 10, legendary: 4.5, crazy: 0.5 } },
            epic_crate: { cost: 2000, weights: { common: 1, uncommon: 3, rare: 11, epic: 70, legendary: 14, crazy: 1 } },
            legendary_crate: { cost: 10000, weights: { common: 0.5, uncommon: 1, rare: 3.5, epic: 15, legendary: 78, crazy: 2 } },
            crazy_crate: { cost: 200000, weights: { common: 0.1, uncommon: 0.4, rare: 1.5, epic: 8, legendary: 30, crazy: 60 } }
        };

        let itemMarket = {};

        function randomizeMarket() {
            Object.values(itemsConfig).flat().forEach(item => {
                const count = lastDayCollectionCount[item.id] || 0;
                let marketWeights = demandTiers.map(t => ({...t}));

                if (count > 0) {
                    marketWeights = marketWeights.map(tier => {
                        let adjustment = 1.0;
                        if (count === 1) {
                            if (tier.id >= 5) adjustment = 2.0;
                            if (tier.id <= 2) adjustment = 0.5;
                        } else if (count >= 5) {
                            if (tier.id <= 3) adjustment = 2.0;
                            if (tier.id >= 6) adjustment = 0.3;
                        } else if (count >= 2) {
                            if (tier.id <= 4) adjustment = 1.3;
                        }
                        return { ...tier, adjustedWeight: tier.weight * adjustment };
                    });
                } else {
                    marketWeights = marketWeights.map(t => ({...t, adjustedWeight: t.weight}));
                }

                const totalWeight = marketWeights.reduce((a, b) => a + b.adjustedWeight, 0);
                let random = Math.random() * totalWeight;
                for (const tier of marketWeights) {
                    if (random < tier.adjustedWeight) {
                        itemMarket[item.id] = tier;
                        break;
                    }
                    random -= tier.adjustedWeight;
                }
            });
            renderInventory(); 
        }

        function nextDay() {
            const counts = {};
            inventory.forEach(item => {
                counts[item.id] = (counts[item.id] || 0) + 1;
            });
            lastDayCollectionCount = counts;

            day++;
            secondsRemaining = 600;
            randomizeMarket();

            inventory.forEach(item => {
                item.ageDays = (item.ageDays || 0) + 1;
            });

            updateUI();
            logHistory(`Day ${day}: Market updated!`, 'info');
        }

        function calculateSellPrice(invItem) {
            const market = itemMarket[invItem.id] || demandTiers[4];
            const age = invItem.ageDays || 0;
            const wearCycles = Math.floor(age / 5);
            // Cumulative 5% decrease: 1.0, 0.95, 0.90, 0.85...
            const wearPenalty = wearCycles * 0.05;
            const itemWearMult = Math.max(0.1, 1 - wearPenalty);

            return Math.floor(invItem.basePrice * market.mult * itemWearMult);
        }

        function openCrate(type) {
            const config = crateConfigs[type];
            if (balance < config.cost) {
                showToast("Not enough Credits!");
                return;
            }
            if (inventory.length >= INV_MAX) {
                showToast("Inventory Full!");
                return;
            }

            balance -= config.cost;
            updateUI();

            const rarity = rollRarity(config.weights);
            const itemBase = rollFromWeightedList(itemsConfig[rarity]);
            const demand = itemMarket[itemBase.id] || demandTiers[4];
            
            const freshPrice = Math.floor(itemBase.basePrice * demand.mult);

            const modal = document.getElementById('result-screen');
            const container = document.getElementById('result-container');
            const rarityClasses = { 
                common: 'rarity-common bg-common', 
                uncommon: 'rarity-uncommon bg-uncommon', 
                rare: 'rarity-rare bg-rare', 
                epic: 'rarity-epic bg-epic', 
                legendary: 'rarity-legendary bg-legendary',
                crazy: 'rarity-crazy bg-crazy'
            };
            
            container.className = `relative w-full max-w-md border-2 rounded-3xl overflow-hidden animate-pop shadow-2xl ${rarityClasses[rarity]}`;
            document.getElementById('rarity-text').innerText = rarity.toUpperCase();
            document.getElementById('result-name').innerText = itemBase.name;
            document.getElementById('result-visual').innerHTML = `<div class="${itemBase.shape}"></div>`;
            document.getElementById('result-price').innerText = `$${freshPrice.toLocaleString()}`;
            document.getElementById('result-demand').innerText = demand.label;
            
            modal.classList.remove('hidden');

            document.getElementById('btn-sell-now').onclick = () => {
                balance += freshPrice;
                logHistory(`Sold ${itemBase.name} for $${freshPrice}`, rarity);
                closeResult();
                updateUI();
            };

            document.getElementById('btn-keep').onclick = () => {
                inventory.push({ ...itemBase, rarity, ageDays: 0 });
                logHistory(`Kept ${itemBase.name}`, rarity);
                closeResult();
                updateUI();
                renderInventory();
            };
        }

        function renderInventory() {
            const list = document.getElementById('inventory-list');
            document.getElementById('inv-count').innerText = inventory.length;
            
            if (inventory.length === 0) {
                list.innerHTML = '<div class="col-span-full py-10 text-center text-slate-600 text-sm">Inventory is empty.</div>';
                return;
            }

            const currentCounts = {};
            inventory.forEach(item => currentCounts[item.id] = (currentCounts[item.id] || 0) + 1);

            list.innerHTML = inventory.map((item, index) => {
                const sellPrice = calculateSellPrice(item);
                const market = itemMarket[item.id] || demandTiers[4];
                const demandColor = market.mult > 1 ? 'text-green-400' : (market.mult < 1 ? 'text-red-400' : 'text-slate-400');
                const age = item.ageDays || 0;
                const wearCycles = Math.floor(age / 5);
                const wearPercent = wearCycles * 5;
                
                const count = currentCounts[item.id];
                let saturationText = "";
                if (count >= 5) saturationText = "FLOODED";
                else if (count === 1) saturationText = "UNIQUE";

                return `
                    <div class="bg-slate-800 border border-slate-700 rounded-lg p-3 text-center flex flex-col items-center justify-between group relative cursor-pointer hover:border-blue-500 transition min-h-[165px]" onclick="sellItem(${index})">
                        <div class="scale-90 mb-2 flex items-center justify-center h-12 w-full rarity-${item.rarity}">
                            <div class="${item.shape}"></div>
                        </div>
                        <div class="w-full">
                            <p class="text-[9px] truncate font-bold uppercase opacity-60 mb-1 leading-tight">${item.name}</p>
                            <p class="text-xs font-mono font-bold text-green-400">$${sellPrice.toLocaleString()}</p>
                            <p class="text-[8px] font-bold ${demandColor} uppercase">${market.label}</p>
                            <div class="mt-2 flex flex-col items-center gap-0.5 border-t border-slate-700 pt-1">
                                <span class="text-[7px] opacity-40 uppercase">Age: ${age}d</span>
                                ${saturationText ? `<span class="text-[7px] font-black tracking-tighter ${count === 1 ? 'text-blue-400' : 'text-amber-600'}">${saturationText}</span>` : ''}
                                ${wearPercent > 0 ? `<span class="text-[7px] text-orange-500 font-black">-${wearPercent}% WORN</span>` : ''}
                            </div>
                        </div>
                        <div class="absolute inset-0 bg-red-600/90 opacity-0 group-hover:opacity-100 flex items-center justify-center rounded-lg transition duration-150">
                            <span class="text-xs font-black tracking-widest">SELL</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function sellItem(index) {
            const item = inventory[index];
            const price = calculateSellPrice(item);
            balance += price;
            inventory.splice(index, 1);
            updateUI();
            renderInventory();
            logHistory(`Sold ${item.name} for $${price}`, item.rarity);
        }

        function bulkSell(type, filterValue) {
            let toSell = [];
            let remaining = [];
            if (type === 'all') {
                toSell = [...inventory];
                inventory = [];
            } else if (type === 'rarity') {
                inventory.forEach(item => {
                    if (item.rarity === filterValue) toSell.push(item);
                    else remaining.push(item);
                });
                inventory = remaining;
            }
            let totalGain = 0;
            toSell.forEach(item => totalGain += calculateSellPrice(item));
            balance += totalGain;
            if (toSell.length > 0) showToast(`Sold ${toSell.length} items!`);
            closeBulkSell();
            updateUI();
            renderInventory();
        }

        function showRarityPicker() {
            const choice = prompt("Type rarity (common, uncommon, rare, epic, legendary, crazy):");
            const valid = ['common', 'uncommon', 'rare', 'epic', 'legendary', 'crazy'];
            if (choice && valid.includes(choice.toLowerCase())) bulkSell('rarity', choice.toLowerCase());
        }

        function toggleInventory() {
            const el = document.getElementById('inventory-panel');
            el.classList.toggle('hidden');
            if (!el.classList.contains('hidden')) renderInventory();
        }

        function openBulkSell() { document.getElementById('bulk-sell-modal').classList.remove('hidden'); }
        function closeBulkSell() { document.getElementById('bulk-sell-modal').classList.add('hidden'); }
        function closeResult() { document.getElementById('result-screen').classList.add('hidden'); }

        function updateUI() {
            document.getElementById('balance').innerText = `$${Math.floor(balance).toLocaleString()}`;
            document.getElementById('day-counter').innerText = day;
            document.getElementById('inv-count').innerText = inventory.length;
        }

        function startTimer() {
            setInterval(() => {
                secondsRemaining--;
                if (secondsRemaining <= 0) nextDay();
                const mins = Math.floor(secondsRemaining / 60);
                const secs = Math.floor(secondsRemaining % 60);
                document.getElementById('timer').innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function rollRarity(weights) {
            const total = Object.values(weights).reduce((a, b) => a + b, 0);
            let r = Math.random() * total;
            for (const [rarity, w] of Object.entries(weights)) {
                if (r < w) return rarity;
                r -= w;
            }
            return 'common';
        }

        function rollFromWeightedList(list) {
            const total = list.reduce((a, b) => a + b.weight, 0);
            let r = Math.random() * total;
            for (const item of list) {
                if (r < item.weight) return item;
                r -= item.weight;
            }
        }

        function logHistory(msg, rarity) {
            const log = document.getElementById('history-log');
            if (log.children[0]?.classList.contains('italic')) log.innerHTML = '';
            const div = document.createElement('div');
            const colorClass = rarity === 'info' ? 'text-blue-400' : `rarity-${rarity}`;
            div.className = `p-2 bg-slate-800/40 rounded border-l-2 text-[11px] ${colorClass}`;
            div.innerText = `[${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}] ${msg}`;
            log.prepend(div);
            if (log.children.length > 6) log.removeChild(log.lastChild);
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = "fixed top-10 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-6 py-3 rounded-full shadow-2xl z-[100] animate-bounce text-sm font-bold pointer-events-none";
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        randomizeMarket();
        updateUI();
        startTimer();
    </script>
</body>
</html>
